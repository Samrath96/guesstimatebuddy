<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuestimateBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0E0C0A; --surface: #161310; --surface2: #1E1A16; --border: #2A2420;
  --gold: #C9943A; --gold2: #E8B86D; --cream: #F0E8D8; --muted: #7A6E62;
  --green: #4A9E6E; --red: #C04A4A; --amber: #C98A3A; --text: #EDE5D8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
  background-image: radial-gradient(ellipse at 10% 20%, rgba(201,148,58,0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 90% 80%, rgba(201,148,58,0.05) 0%, transparent 50%);
}
.screen { display: none; min-height: 100vh; padding: 24px 20px; max-width: 600px; margin: 0 auto; }
.screen.active { display: flex; flex-direction: column; }

/* LOGO & TYPOGRAPHY */
.logo-wrap { margin-bottom: 48px; text-align: center; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; color: var(--cream); letter-spacing: -1px; }
.logo span { color: var(--gold); font-style: italic; }
.logo-sub { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 8px; }

/* TIMER UI */
.timer-container {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 15px; background: var(--surface2); padding: 10px 15px;
  border-radius: 8px; border: 1px solid var(--border);
}
.timer-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.timer-value { font-family: 'DM Mono', monospace; color: var(--gold); font-weight: 600; }

/* BUTTONS & CARDS */
.btn-google, .start-btn, .submit-btn, .try-again-btn { 
  width: 100%; padding: 15px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; font-family: inherit;
}
.btn-google { background: var(--surface2); color: var(--text); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; }
.start-btn, .submit-btn, .try-again-btn { background: var(--gold); color: var(--bg); }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; }
.stat-number { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--gold); }
.history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

/* TEXTAREA & MIC */
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; min-height: 120px; outline: none; margin-bottom: 14px; }
.mic-btn { width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; margin-bottom: 10px; }

/* LOADING */
.spinner { width: 44px; height: 44px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loadingStatus { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--muted); font-style: italic; text-align: center; }

/* HISTORY SCORE COLORS */
.score-high { color: var(--green); } .score-mid { color: var(--amber); } .score-low { color: var(--red); }
</style>
</head>
<body>

<!-- SCREEN: LOGIN -->
<div class="screen active" id="screen-login">
  <div class="logo-wrap">
    <div class="logo">Guestimate<span>Buddy</span></div>
    <div class="logo-sub">Sharpen your estimation skills</div>
  </div>
  <button class="btn-google" onclick="signInWithGoogle()">Continue with Google</button>
</div>

<!-- SCREEN: HOME -->
<div class="screen" id="screen-home">
  <div style="display:flex; justify-content:space-between; margin-bottom:28px;">
    <div style="font-family:'Cormorant Garamond'; color:var(--gold); font-style:italic; font-size:22px;">GuestimateBuddy</div>
    <img id="userAvatar" src="" style="width:28px; border-radius:50%; border:1px solid var(--border);">
  </div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:28px;">
    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div style="font-size:10px; color:var(--muted)">ATTEMPTS</div></div>
    <div class="stat-card"><div class="stat-number" id="statAvg">—</div><div style="font-size:10px; color:var(--muted)">AVG SCORE</div></div>
    <div class="stat-card"><div class="stat-number" id="statBest">—</div><div style="font-size:10px; color:var(--muted)">BEST</div></div>
  </div>
  <button class="start-btn" onclick="startPractice()">Start Practice →</button>
  <div style="font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:2px; text-transform:uppercase;">Recent Sessions</div>
  <div id="historyList"></div>
</div>

<!-- SCREEN: QUESTION -->
<div class="screen" id="screen-question">
  <button onclick="showScreen('screen-home')" style="background:none; border:none; color:var(--muted); cursor:pointer; margin-bottom:20px;">← Back</button>
  <div class="timer-container">
    <div class="timer-label">Thinking Time</div>
    <div id="stopwatch" class="timer-value">00:00</div>
  </div>
  <div style="background:var(--surface); padding:20px; border-radius:10px; border-left:3px solid var(--gold); margin-bottom:24px;">
    <div id="questionText" style="font-family:'Cormorant Garamond'; font-size:20px; color:var(--cream);">Loading...</div>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤 Tap to speak your answer</button>
  <textarea id="answerBox" placeholder="Type your approach step-by-step..."></textarea>
  <button class="submit-btn" onclick="submitAnswer()">Evaluate My Answer →</button>
</div>

<!-- SCREEN: LOADING -->
<div class="screen" id="screen-loading" style="justify-content:center;">
  <div class="spinner"></div>
  <div id="loadingStatus">Your buddy is thinking...</div>
</div>

<!-- SCREEN: FEEDBACK -->
<div class="screen" id="screen-feedback">
  <div style="border-bottom:1px solid var(--border); padding-bottom:16px; margin-bottom:20px;">
    <div style="font-size:11px; color:var(--muted); text-transform:uppercase;">Question</div>
    <div id="feedbackQ" style="font-family:'Cormorant Garamond'; color:var(--cream); opacity:0.7;"></div>
  </div>
  <div style="background:var(--surface); padding:16px; border-radius:10px; margin-bottom:12px; border:1px solid var(--border);">
    <div style="font-size:48px; font-family:'Cormorant Garamond'; font-weight:600;" id="scoreBig">0</div>
    <div id="feedbackText" style="font-size:13px; line-height:1.7; opacity:0.85;"></div>
  </div>
  <div style="background:var(--surface); padding:16px; border-radius:10px; border:1px solid var(--border); margin-bottom:20px;">
    <div style="font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px;">Ideal Approach</div>
    <div id="idealText" style="font-size:12px; font-family:'DM Mono'; line-height:1.6;"></div>
  </div>
  <button class="try-again-btn" onclick="startPractice()">Try Another Question →</button>
  <button onclick="showScreen('screen-home')" style="width:100%; background:none; border:1px solid var(--border); color:var(--muted); padding:12px; border-radius:10px; margin-top:8px; cursor:pointer;">Back Home</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, orderBy, limit, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOAlZimGlofylq0XE_wxtz1T-ZBFPeVJE",
  authDomain: "guesstimatebuddy-fa941.firebaseapp.com",
  projectId: "guesstimatebuddy-fa941",
  storageBucket: "guesstimatebuddy-fa941.firebasestorage.app",
  messagingSenderId: "7501792540",
  appId: "1:7501792540:web:7ee2bafeccca22dc9be6d9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let currentQuestion = '';
let secondsElapsed = 0;
let timerInterval;

const loadingPhrases = ["Synthesizing industry benchmarks...", "Structuring MECE feedback...", "Validating assumptions...", "Calculating order of magnitude...", "Comparing to casebook standards..."];

onAuthStateChanged(auth, user => {
  if (user) { 
    currentUser = user; 
    document.getElementById('userAvatar').src = user.photoURL; 
    loadHistory(); 
    showScreen('screen-home'); 
  } else { 
    showScreen('screen-login'); 
  }
});

window.signInWithGoogle = () => signInWithPopup(auth, provider);

window.showScreen = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
};

function cycleLoader() {
  let i = 0;
  return setInterval(() => {
    document.getElementById('loadingStatus').textContent = loadingPhrases[++i % loadingPhrases.length];
  }, 2000);
}

window.startPractice = async () => {
  showScreen('screen-loading');
  const loader = cycleLoader();
  document.getElementById('answerBox').value = '';
  secondsElapsed = 0;
  
  const question = await callGemini(
    "Generate ONE realistic guesstimate question set in India. Return ONLY the question text.",
    "Generate a question."
  );

  clearInterval(loader);
  currentQuestion = question;
  document.getElementById('questionText').textContent = question;
  showScreen('screen-question');
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsElapsed++;
    const m = Math.floor(secondsElapsed/60).toString().padStart(2,'0');
    const s = (secondsElapsed%60).toString().padStart(2,'0');
    document.getElementById('stopwatch').textContent = `${m}:${s}`;
  }, 1000);
};

window.submitAnswer = async () => {
  const answer = document.getElementById('answerBox').value.trim();
  if (!answer) return alert("Enter your answer.");
  
  clearInterval(timerInterval);
  showScreen('screen-loading');
  const loader = cycleLoader();

  try {
    const evaluation = await callGemini(
      `Evaluate strictly. Format response EXACTLY as: Score: X/10 | Feedback: [feedback]`,
      `Question: ${currentQuestion}\nAnswer: ${answer}`
    );
    const ideal = await callGemini(
      `Return answer in clean HTML using <h4>, <ul>, <li> tags only.`,
      `Question: ${currentQuestion}`
    );

    const score = parseInt(evaluation.match(/Score:\s*(\d+)/)?.[1] || 5);
    const feedback = evaluation.split('|')[1]?.replace('Feedback:', '').trim() || evaluation;

    document.getElementById('feedbackQ').textContent = currentQuestion;
    document.getElementById('scoreBig').textContent = score;
    document.getElementById('scoreBig').style.color = score >= 8 ? 'var(--green)' : score >= 5 ? 'var(--amber)' : 'var(--red)';
    document.getElementById('feedbackText').textContent = feedback;
    document.getElementById('idealText').innerHTML = ideal;
    
    showScreen('screen-feedback');

    if (currentUser) {
      await addDoc(collection(db, 'sessions'), { uid: currentUser.uid, question: currentQuestion, score, createdAt: serverTimestamp() });
      loadHistory();
    }
  } catch (e) { alert("Error analyzing. Try again."); showScreen('screen-home'); }
  finally { clearInterval(loader); }
};

async function loadHistory() {
  if (!currentUser) return;
  try {
    const q = query(collection(db, 'sessions'), where('uid', '==', currentUser.uid), orderBy('createdAt', 'desc'), limit(5));
    const snap = await getDocs(q);
    const list = document.getElementById('historyList');
    let sessions = [];
    snap.forEach(d => sessions.push(d.data()));

    if (sessions.length > 0) {
      document.getElementById('statTotal').textContent = sessions.length;
      document.getElementById('statAvg').textContent = (sessions.reduce((a,b)=>a+b.score,0)/sessions.length).toFixed(1);
      document.getElementById('statBest').textContent = Math.max(...sessions.map(s=>s.score));
    }

    list.innerHTML = sessions.map(s => `
      <div class="history-item">
        <div style="font-size:12px; opacity:0.8;">${s.question.substring(0,50)}...</div>
        <div class="${s.score>=8?'score-high':s.score>=5?'score-mid':'score-low'}" style="font-weight:600;">${s.score}/10</div>
      </div>
    `).join('') || '<div style="text-align:center; color:var(--muted); padding:20px;">No sessions yet.</div>';
  } catch (e) { console.log("Index building required for history sorting."); }
}

async function callGemini(systemInstruction, userMessage) {
  const res = await fetch('/api/gemini', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ systemInstruction, userMessage })
  });
  const data = await res.json();
  return data.text;
}

// Mic Logic
window.toggleMic = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("Speech not supported in this browser.");
  const rec = new SR(); rec.lang = 'en-IN';
  rec.onstart = () => document.getElementById('micBtn').textContent = "🔴 Listening...";
  rec.onresult = e => document.getElementById('answerBox').value = e.results[0][0].transcript;
  rec.onend = () => document.getElementById('micBtn').textContent = "🎤 Tap to speak your answer";
  rec.start();
};
</script>
</body>
</html>
