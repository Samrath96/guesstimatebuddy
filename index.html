<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuestimateBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<style>
:root {
  --bg: #0E0C0A; --surface: #161310; --surface2: #1E1A16; --border: #2A2420;
  --gold: #C9943A; --gold2: #E8B86D; --cream: #F0E8D8; --muted: #7A6E62;
  --green: #4A9E6E; --red: #C04A4A; --amber: #C98A3A; --text: #EDE5D8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
  background-image: radial-gradient(ellipse at 10% 20%, rgba(201,148,58,0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 90% 80%, rgba(201,148,58,0.05) 0%, transparent 50%);
}
.screen { display: none; min-height: 100vh; padding: 24px 20px; max-width: 600px; margin: 0 auto; }
.screen.active { display: flex; flex-direction: column; }

/* TOP BAR & LOGO */
.top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.top-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold); font-style: italic; }
.user-info { display: flex; align-items: center; gap: 12px; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
.sign-out-btn { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 4px 8px; border-radius: 4px; transition: color 0.2s; }
.sign-out-btn:hover { color: var(--red); }

.logo-wrap { margin-bottom: 48px; text-align: center; margin-top: 20vh; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; color: var(--cream); letter-spacing: -1px; }
.logo span { color: var(--gold); font-style: italic; }
.logo-sub { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 8px; }

/* TIMER */
.timer-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--surface2); padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); }
.timer-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.timer-value { font-family: 'DM Mono', monospace; color: var(--gold); font-weight: 600; }

/* STATS & HISTORY */
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; }
.stat-number { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--gold); }
.history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.score-high { color: var(--green); } .score-mid { color: var(--amber); } .score-low { color: var(--red); }

/* UI ELEMENTS */
.start-btn, .submit-btn, .try-again-btn { width: 100%; padding: 16px; background: var(--gold); color: var(--bg); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 24px; }
.start-btn:hover { background: var(--gold2); }
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; min-height: 120px; outline: none; margin-bottom: 14px; line-height: 1.6; }
.mic-btn { width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-family: inherit; }
.spinner { width: 44px; height: 44px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loadingStatus { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--muted); font-style: italic; text-align: center; }
.ideal-text h4 { color: var(--gold); margin: 15px 0 8px; font-size: 14px; text-transform: uppercase; }
.ideal-text ul { padding-left: 18px; margin-bottom: 10px; color: rgba(237, 229, 216, 0.8); }
</style>
</head>
<body>

<!-- SCREEN: LOGIN -->
<div class="screen active" id="screen-login">
  <div class="logo-wrap">
    <div class="logo">Guestimate<span>Buddy</span></div>
    <div class="logo-sub">Sharpen your estimation skills</div>
  </div>
  <button class="start-btn" style="background:var(--surface2); color:var(--text); border:1px solid var(--border);" onclick="signInWithGoogle()">Continue with Google</button>
</div>

<!-- SCREEN: HOME -->
<div class="screen" id="screen-home">
  <div class="top-bar">
    <div class="top-logo">GuestimateBuddy</div>
    <div class="user-info">
      <img class="user-avatar" id="userAvatar" src="">
      <button class="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>
  
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:28px;">
    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div style="font-size:10px; color:var(--muted); letter-spacing:1px;">ATTEMPTS</div></div>
    <div class="stat-card"><div class="stat-number" id="statAvg">—</div><div style="font-size:10px; color:var(--muted); letter-spacing:1px;">AVG SCORE</div></div>
    <div class="stat-card"><div class="stat-number" id="statBest">—</div><div style="font-size:10px; color:var(--muted); letter-spacing:1px;">BEST</div></div>
  </div>
  
  <button class="start-btn" onclick="startPractice()">Start Practice →</button>
  <div style="font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:2px; text-transform:uppercase;">Recent Sessions</div>
  <div id="historyList"></div>
</div>

<!-- SCREEN: QUESTION -->
<div class="screen" id="screen-question">
  <button onclick="showScreen('screen-home')" style="background:none; border:none; color:var(--muted); cursor:pointer; margin-bottom:20px; font-family:inherit;">← Back</button>
  <div class="timer-container">
    <div class="timer-label">Thinking Time</div>
    <div id="stopwatch" class="timer-value">00:00</div>
  </div>
  <div style="background:var(--surface); padding:20px; border-radius:10px; border-left:3px solid var(--gold); margin-bottom:24px;">
    <div id="questionText" style="font-family:'Cormorant Garamond'; font-size:20px; color:var(--cream); line-height:1.5;">Loading...</div>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤 Tap to speak your answer</button>
  <textarea id="answerBox" placeholder="Walk through your approach step by step..."></textarea>
  <button class="submit-btn" onclick="submitAnswer()">Evaluate My Answer →</button>
</div>

<!-- SCREEN: LOADING -->
<div class="screen" id="screen-loading" style="justify-content:center;">
  <div class="spinner"></div>
  <div id="loadingStatus">Your buddy is thinking...</div>
</div>

<!-- SCREEN: FEEDBACK -->
<div class="screen" id="screen-feedback">
  <div style="border-bottom:1px solid var(--border); padding-bottom:16px; margin-bottom:20px;">
    <div style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;">Question</div>
    <div id="feedbackQ" style="font-family:'Cormorant Garamond'; color:var(--cream); opacity:0.7; font-size:16px;"></div>
  </div>
  <div style="background:var(--surface); padding:20px; border-radius:10px; margin-bottom:12px; border:1px solid var(--border);">
    <div style="font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px;">Your Score</div>
    <div style="display:flex; align-items:baseline; gap:5px; margin-bottom:10px;">
        <span style="font-size:48px; font-family:'Cormorant Garamond'; font-weight:600;" id="scoreBig">0</span>
        <span style="color:var(--muted); font-family:'Cormorant Garamond'; font-size:20px;">/10</span>
    </div>
    <div id="feedbackText" style="font-size:13px; line-height:1.7; opacity:0.85;"></div>
  </div>
  <div style="background:var(--surface); padding:20px; border-radius:10px; border:1px solid var(--border); margin-bottom:20px;">
    <div style="font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:15px;">Ideal Approach</div>
    <div id="idealText" class="ideal-text" style="font-size:13px;"></div>
  </div>
  <button class="try-again-btn" onclick="startPractice()">Try Another Question →</button>
  <button onclick="showScreen('screen-home')" style="width:100%; background:none; border:1px solid var(--border); color:var(--muted); padding:12px; border-radius:10px; margin-top:8px; cursor:pointer; font-family:inherit; font-size:13px;">Back to Home</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, limit, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOAlZimGlofylq0XE_wxtz1T-ZBFPeVJE",
  authDomain: "guesstimatebuddy-fa941.firebaseapp.com",
  projectId: "guesstimatebuddy-fa941",
  storageBucket: "guesstimatebuddy-fa941.firebasestorage.app",
  messagingSenderId: "7501792540",
  appId: "1:7501792540:web:7ee2bafeccca22dc9be6d9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let currentQuestion = '';
let secondsElapsed = 0;
let timerInterval;

const loadingPhrases = ["Synthesizing industry benchmarks...", "Structuring MECE feedback...", "Validating assumptions...", "Calculating order of magnitude...", "Comparing to casebook standards..."];

onAuthStateChanged(auth, user => {
  if (user) { 
    currentUser = user; 
    document.getElementById('userAvatar').src = user.photoURL; 
    loadHistory(); 
    showScreen('screen-home'); 
  } else { 
    showScreen('screen-login'); 
  }
});

window.signInWithGoogle = () => signInWithPopup(auth, provider);
window.signOut = () => fbSignOut(auth);

window.showScreen = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
};

function cycleLoader() {
  let i = 0;
  return setInterval(() => {
    document.getElementById('loadingStatus').textContent = loadingPhrases[++i % loadingPhrases.length];
  }, 2000);
}

window.startPractice = async () => {
  showScreen('screen-loading');
  const loader = cycleLoader();
  document.getElementById('answerBox').value = '';
  secondsElapsed = 0;
  document.getElementById('stopwatch').textContent = "00:00";
  
  // Anti-repeat logic
  const historyItems = document.querySelectorAll('.history-item-q-text');
  const pastQuestions = Array.from(historyItems).map(el => el.textContent).join(", ");

  const question = await callGemini(
    `You are a Senior Partner at an MBB consulting firm. Generate a realistic, challenging guesstimate question set in the Indian context.
     STRICT RULES:
     - DO NOT repeat any of these recent questions: [${pastQuestions}]
     - Rotate between sectors: FMCG, Tech, Infra, Transport, Healthcare, or Luxury.
     - Return ONLY the question text.`,
    "Generate a unique high-quality MBB guesstimate question."
  );

  clearInterval(loader);
  currentQuestion = question;
  document.getElementById('questionText').textContent = question;
  showScreen('screen-question');
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsElapsed++;
    const m = Math.floor(secondsElapsed/60).toString().padStart(2,'0');
    const s = (secondsElapsed%60).toString().padStart(2,'0');
    document.getElementById('stopwatch').textContent = `${m}:${s}`;
  }, 1000);
};

window.submitAnswer = async () => {
  const answer = document.getElementById('answerBox').value.trim();
  if (!answer) return alert("Please type your answer.");
  
  clearInterval(timerInterval);
  showScreen('screen-loading');
  const loader = cycleLoader();

  try {
    const evaluation = await callGemini(
      `You are a strict interviewer evaluating a candidate's answer. Format response EXACTLY as: Score: X/10 | Feedback: [feedback]`,
      `Question: ${currentQuestion}\nCandidate Answer: ${answer}`
    );

    const ideal = await callGemini(
      `You are an expert interview coach. Return answer in clean HTML using <h4>, <ul>, <li> tags only.`,
      `Question: ${currentQuestion}\nCandidate Answer: ${answer}`
    );

    const score = parseInt(evaluation.match(/Score:\s*(\d+)/)?.[1] || 5);
    const feedback = evaluation.split('|')[1]?.replace('Feedback:', '').trim() || evaluation;

    document.getElementById('feedbackQ').textContent = currentQuestion;
    document.getElementById('scoreBig').textContent = score;
    document.getElementById('scoreBig').style.color = score >= 8 ? 'var(--green)' : score >= 5 ? 'var(--amber)' : 'var(--red)';
    document.getElementById('feedbackText').textContent = feedback;
    document.getElementById('idealText').innerHTML = ideal;
    
    showScreen('screen-feedback');

    if (currentUser) {
      await addDoc(collection(db, 'sessions'), { uid: currentUser.uid, question: currentQuestion, score, createdAt: serverTimestamp() });
      loadHistory();
    }
  } catch (e) { alert("Error analyzing. Try again."); showScreen('screen-home'); }
  finally { clearInterval(loader); }
};

async function loadHistory() {
  if (!currentUser) return;
  try {
    const q = query(collection(db, 'sessions'), where('uid', '==', currentUser.uid), limit(20));
    const snap = await getDocs(q);
    const list = document.getElementById('historyList');
    let sessions = [];
    snap.forEach(d => sessions.push(d.data()));

    // Client-side sorting (Removes need for index)
    sessions.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

    if (sessions.length > 0) {
      document.getElementById('statTotal').textContent = sessions.length;
      document.getElementById('statAvg').textContent = (sessions.reduce((a,b)=>a+b.score,0)/sessions.length).toFixed(1);
      document.getElementById('statBest').textContent = Math.max(...sessions.map(s=>s.score));
    }

    list.innerHTML = sessions.slice(0, 5).map(s => `
      <div class="history-item">
        <div class="history-item-q-text" style="font-size:12px; opacity:0.8;">${s.question.substring(0,50)}...</div>
        <div class="${s.score>=8?'score-high':s.score>=5?'score-mid':'score-low'}" style="font-family:'Cormorant Garamond'; font-size:20px; font-weight:600;">${s.score}/10</div>
      </div>
    `).join('') || '<div style="text-align:center; padding:20px; font-style:italic; color:var(--muted);">No sessions yet.</div>';
  } catch (e) { console.log("History failed:", e); }
}

async function callGemini(systemInstruction, userMessage) {
  const res = await fetch('/api/gemini', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ systemInstruction, userMessage })
  });
  const data = await res.json();
  return data.text;
}

window.toggleMic = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("Use Chrome.");
  const rec = new SR(); rec.lang = 'en-IN';
  rec.onstart = () => document.getElementById('micBtn').textContent = "🔴 Listening...";
  rec.onresult = e => document.getElementById('answerBox').value = e.results[0][0].transcript;
  rec.onend = () => document.getElementById('micBtn').textContent = "🎤 Tap to speak your answer";
  rec.start();
};
</script>
</body>
</html>
